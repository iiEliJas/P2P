#
# Phase 1 Configuration
#
# All parameters for Phase 1.
#

######################################################
# Data
#
data:
  filename: "DataCoSupplyChainDataset.csv"
  encoding: "latin-1"
  frequency: "W"  # W for weekly
  drop_last_weeks: 20 # drop everything after october 2017 to ensure a clean dataset

  columns:
    order_date: "order date (DateOrders)"
    quantity:   "Order Item Quantity"
    ship_date:  "shipping date (DateOrders)"

#####################################################
# Train and test split
#
split:
  train_weeks: 134
  test_weeks: 8

#####################################################
# Cleaning
#
cleaning:
  outlier_method: "iqr" 

######################################################
# Forecasting
#
forecasting:
  horizon:          8               # weeks to forecast
  lookback:         8               # context window
  seasonal_periods: [52, 13]         # year + quarter
  trend_window:     35              # loess window

######################################################
# Outputs
#
outputs:
  save_forecast_csv:  true          # write forecasts/phase1_forecast.csv
  save_metrics_json:  true          # write forecasts/phase1_metrics.json
  save_plots:         true          # write HTML plots to results/visualizations/