name: Tests
 
on:
  push:
    branches: ["**"]        # every branch
  pull_request:
    branches: ["**"]
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
 
      - name: Install dependencies
        run: pip install -e ".[dev,ml]"
 
      - name: Run tests
        run: pytest tests/unit/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=60